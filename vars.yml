---
# ---------------------------------------------------------------------------
# Users to create. Each user is added to the listed groups (sudo, docker, ...)
# Set ssh_pub_key to the path of a public key file on the CONTROL machine;
# its contents get pushed to the target's ~/.ssh/authorized_keys.
# ---------------------------------------------------------------------------
users:
  - name: ubuntu
    groups: sudo
    shell: /bin/bash
    ssh_pub_key: "{{ lookup('env', 'HOME') }}/.ssh/id_ed25519.pub"

# ---------------------------------------------------------------------------
# Base packages installed for every machine (common role)
# ---------------------------------------------------------------------------
packages:
  - git
  - curl
  - wget
  - vim
  - htop
  - ufw
  - build-essential
  - unzip
  - ca-certificates
  - gnupg
  - lsb-release
  - net-tools

# ---------------------------------------------------------------------------
# Security role settings
# ---------------------------------------------------------------------------
ssh_port: 22
ssh_password_authentication: false   # key-only login
ssh_permit_root_login: false
ufw_allowed_ports:
  - "{{ ssh_port }}"
  - "80"
  - "443"

# ---------------------------------------------------------------------------
# Docker role settings
# ---------------------------------------------------------------------------
docker_users: "{{ users | map(attribute='name') | list }}"

# ---------------------------------------------------------------------------
# Devtools role settings
# ---------------------------------------------------------------------------
git_user_name: "Developer"
git_user_email: "developer@example.com"

node_major_version: "22"        # installed via NodeSource
install_vscode: true

# ROS 2 is optional and heavy (~2GB+), disabled by default.
# Set to true and adjust ros_distro if you want it provisioned too.
install_ros: false
ros_distro: "jazzy"
