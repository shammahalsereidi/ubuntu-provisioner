---
- name: Upgrade all apt packages
  ansible.builtin.apt:
    upgrade: dist
    update_cache: true

- name: Install base packages
  ansible.builtin.apt:
    name: "{{ packages }}"
    state: present

- name: Create users
  ansible.builtin.user:
    name: "{{ item.name }}"
    groups: "{{ item.groups }}"
    shell: "{{ item.shell }}"
    append: true
    create_home: true
  loop: "{{ users }}"

- name: Ensure .ssh directory exists for each user
  ansible.builtin.file:
    path: "/home/{{ item.name }}/.ssh"
    state: directory
    mode: "0700"
    owner: "{{ item.name }}"
    group: "{{ item.name }}"
  loop: "{{ users }}"

- name: Push public key to authorized_keys (if key file exists on control node)
  ansible.posix.authorized_key:
    user: "{{ item.name }}"
    state: present
    key: "{{ lookup('file', item.ssh_pub_key) }}"
  loop: "{{ users }}"
  when: item.ssh_pub_key is defined and (item.ssh_pub_key is file)

- name: Set timezone
  community.general.timezone:
    name: "Etc/UTC"

- name: Remove unused packages
  ansible.builtin.apt:
    autoremove: true
